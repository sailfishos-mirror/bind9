# common configuration
include "named.conf.header";

view "recursive" {
    zone "." {
	type hint;
	file "root.hint";
    };

    # policy configuration to be tested
    response-policy {
	zone "invalidprefixlength";
    };

    # policy zones to be tested
    zone "invalidprefixlength" { type primary; file "db.invalidprefixlength"; };
};
