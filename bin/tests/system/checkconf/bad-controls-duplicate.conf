key rndc-key {
	algorithm "hmac-sha256";
        secret "xxxxxxxxxxxxxxxxxxxxxxxx";
};

key ddns-key {
	algorithm "hmac-sha256";
        secret "yyyyyyyyyyyyyyyyyyyyyyyy";
};

controls {
	inet 127.0.0.1 port 953 allow { 127.0.0.1; } keys { "rndc-key"; };
};

controls {
	inet 127.0.0.1 allow { 127.0.0.1; } keys { ddns-key; };
};
