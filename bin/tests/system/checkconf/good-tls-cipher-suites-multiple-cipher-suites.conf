tls local-tls {
	protocols { TLSv1.3; };
	key-file "key.pem";
	cert-file "cert.pem";
	dhparam-file "dhparam.pem";
	cipher-suites "TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256";
	prefer-server-ciphers yes;
	session-tickets no;
};

options {
	listen-on port 853 tls local-tls { 10.53.0.1; };
};
